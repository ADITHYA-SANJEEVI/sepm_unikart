    <text x="644" y="196" fill="#F3BF67" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 4</text>
    <text x="644" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Coordinate</text>
    <text x="644" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Meetup request</text>
    <text x="644" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">TomTom route</text>
    <text x="644" y="318" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Two-sided confirmation</text>
  </g>

  <g>
