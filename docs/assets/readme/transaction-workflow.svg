    <text x="828" y="196" fill="#71D9B1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 5</text>
    <text x="828" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Complete</text>
    <text x="828" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Tracked handoff</text>
    <text x="828" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Notifications</text>
    <text x="828" y="318" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Profile activity signals</text>
  </g>

  <g>
    <rect x="988" y="160" width="144" height="166" rx="22" fill="url(#stepA)" stroke="rgba(239,68,68,0.30)"/>
    <text x="1012" y="196" fill="#F4A3A3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 6</text>
    <text x="1012" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Govern</text>
    <text x="1012" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Reports</text>
    <text x="1012" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Moderation actions</text>
    <text x="1012" y="318" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Evidence exports</text>
  </g>

  <path d="M224 243H242" stroke="#7F8BB3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M408 243H426" stroke="#7F8BB3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M592 243H610" stroke="#7F8BB3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M776 243H794" stroke="#7F8BB3" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M960 243H978" stroke="#7F8BB3" stroke-width="4" marker-end="url(#arrow)"/>
