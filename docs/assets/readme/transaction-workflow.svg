<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1140" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="1" stop-color="#171E36"/>
    </linearGradient>
    <linearGradient id="stepA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#181F38"/>
      <stop offset="1" stop-color="#10162A"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#7F8BB3"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="380" rx="22" stroke="rgba(255,255,255,0.08)"/>

  <text x="68" y="76" fill="#F7F8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Campus transaction workflow</text>
  <text x="68" y="108" fill="#B8C0DD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">The project links discovery, negotiation, safety, and meetup execution into one continuous product flow.</text>

  <g>
    <rect x="68" y="160" width="156" height="166" rx="22" fill="url(#stepA)" stroke="rgba(108,99,255,0.26)"/>
    <text x="92" y="196" fill="#9D96FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 1</text>
    <text x="92" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Discover</text>
    <text x="92" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Browse listings</text>
    <text x="92" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Save filters</text>
    <text x="92" y="318" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Build compare queue</text>
  </g>

  <g>
    <rect x="252" y="160" width="156" height="166" rx="22" fill="url(#stepA)" stroke="rgba(108,99,255,0.26)"/>
    <text x="276" y="196" fill="#9D96FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 2</text>
    <text x="276" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Evaluate</text>
    <text x="276" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Trust score</text>
    <text x="276" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Seller profile</text>
    <text x="276" y="318" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Listing packet export</text>
  </g>

  <g>
    <rect x="436" y="160" width="156" height="166" rx="22" fill="url(#stepA)" stroke="rgba(245,166,35,0.30)"/>
    <text x="460" y="196" fill="#F3BF67" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">STEP 3</text>
    <text x="460" y="232" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Negotiate</text>
    <text x="460" y="266" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">In-app chat</text>
    <text x="460" y="292" fill="#D8DEF2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Offers and holds</text>
